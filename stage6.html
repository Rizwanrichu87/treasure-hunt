<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treasure Hunt - Stage</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Animated Background Elements -->
  <div class="background-animations">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <div class="container">
    <div class="tekron-brand">TEKRON</div>
    <h1 class="title-main">Treasure Hunt</h1>
    <h2 id="stage-title">Loading...</h2>
    
    <p id="instruction-text" style="text-align: center; margin-bottom: 25px; font-size: 1.1rem; color: #eee;">
      Slide the tiles to solve the puzzle and reveal the passcode entry.
    </p>

    <!-- Puzzle Area -->
    <div id="puzzle-container"></div>

    <!-- Passcode Area (Hidden initially) -->
    <div id="passcode-section" class="hidden">
      <h3>Enter Location Passcode</h3>
      <input type="text" id="passcode-input" placeholder="Enter Passcode..." autocomplete="off">
      <button id="submit-passcode">Unlock Next Clue</button>
      <p id="passcode-error" class="error-msg hidden">Incorrect passcode, try again!</p>
    </div>

    <!-- Clue Area (Hidden initially) -->
    <div id="clue-section" class="hidden">
      <h3>Next Module Unlocked!</h3>
      <p id="clue-text"></p>
      <br>
      <button onclick="window.location.href='index.html'" style="background: #333; margin-top: 20px;">Back to Menu</button>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
